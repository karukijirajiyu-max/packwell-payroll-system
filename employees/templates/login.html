<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f3f4f6;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .login-card{
            width:100%;
            max-width:450px;
            background:white;
            border-radius:24px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .login-header{
            text-align:center;
            margin-bottom:35px;
        }

        .login-icon{
            font-size:55px;
            margin-bottom:18px;
        }

        .login-title{
            font-size:32px;
            font-weight:700;
            color:#111827;
            margin-bottom:10px;
        }

        .login-subtitle{
            color:#6b7280;
            font-size:15px;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-label{
            display:block;
            margin-bottom:10px;
            font-weight:600;
            color:#374151;
        }

        .form-control{
            width:100%;
            padding:15px;
            border:1px solid #d1d5db;
            border-radius:14px;
            font-size:16px;
            transition:0.3s ease;
            background:#f9fafb;
        }

        .form-control:focus{
            outline:none;
            border-color:#2563eb;
            background:white;
            box-shadow:0 0 0 4px rgba(37,99,235,0.15);
        }

        .btn-login{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
            margin-top:10px;
        }

        .btn-login:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .footer-text{
            text-align:center;
            margin-top:25px;
            color:#6b7280;
            font-size:14px;
        }

    </style>

</head>
<body>

<div class="login-card">

    <div class="login-header">

        <div class="login-icon">
            👨‍💼
        </div>

        <div class="login-title">
            PACKWELL
        </div>

        <div class="login-subtitle">
            Employee Payroll System
        </div>

    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label class="form-label">
                Employee ID
            </label>

            <input
                type="text"
                name="employee_id"
                class="form-control"
                placeholder="Enter Employee ID"
                required
            >

        </div>

        <div class="form-group">

            <label class="form-label">
                Email Address
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
            >

        </div>

        <button type="submit" class="btn-login">
            Send OTP
        </button>

    </form>

    <div class="footer-text">
        Payroll Management System
    </div>

</div>

</body>
</html>
